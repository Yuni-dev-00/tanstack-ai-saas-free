name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Never run two deploys to the same Worker in parallel — wrangler would
  # race on the pipeline upload and one of them would silently lose.
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Migrate → Deploy → Canary
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only one environment by design — this template deploys one Worker.
    # Spawn a staging env by forking this workflow when the product
    # matures enough to need a pre-prod target.
    environment: production
    permissions:
      contents: write # to cut a release on success
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm vitest run

      # db:migrate BEFORE build + deploy — if migrations fail we abort
      # without touching the Worker. This is safe for ADDITIVE schema
      # changes (new tables, new nullable columns). Breaking changes
      # (drop column, rename, NOT NULL add) require the expand-migrate-
      # contract runbook — see docs/runbooks/ci-deploy.md.
      - name: Apply DB migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm db:migrate

      - name: Build
        run: pnpm build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Stamp the deploy with the git SHA so /health reports what's
          # actually live (useful for triaging "is this fixed yet?"
          # against an open incident).
          vars: |
            GIT_COMMIT=${{ github.sha }}
            APP_VERSION=${{ github.sha }}
          command: deploy --minify

      # Post-deploy canary. Fail the workflow if /health can't confirm
      # DB reachability within ~60s so an observably-broken deploy
      # (e.g. Neon branch migrated, but Hyperdrive points at the old
      # branch) doesn't get greenlit.
      - name: Health canary
        env:
          HEALTH_URL: ${{ secrets.HEALTH_URL }}
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5 6; do
            echo "attempt $i …"
            body=$(curl -sf --max-time 10 "$HEALTH_URL" || echo '{}')
            echo "response: $body"
            ok=$(echo "$body" | jq -r '.status == "ok" and .db == true' || echo "false")
            if [ "$ok" = "true" ]; then
              echo "health passed on attempt $i"
              exit 0
            fi
            sleep 10
          done
          echo "health canary never returned ok — deploy may be broken"
          exit 1

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: deploy-${{ github.run_number }}
          name: Deploy ${{ github.run_number }} — ${{ github.sha }}
          body: |
            Automated deploy to production.
            Commit: ${{ github.sha }}
            Actor: ${{ github.actor }}
          generate_release_notes: true

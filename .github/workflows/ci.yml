name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  # Cancel in-progress runs for the same ref so PR force-pushes don't
  # stack up minutes we don't need.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm vitest run

      - name: Build
        # Build must not require runtime secrets — all DB-touching code paths
        # guard against build-time execution (see docs/runbooks/ci-deploy.md).
        run: pnpm build
